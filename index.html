<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Software</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- jQuery (required by original templates & Select2) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <!-- Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <!-- Chart.js & ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- Firebase JS SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fas fa-warehouse"></i>
        <div class="brand-text">
          <h2>Billing Software</h2>
          <span>Firebase Edition</span>
        </div>
      </div>

      <ul class="nav-list">
        <li class="nav-item active">
          <a href="#dashboard" data-page="dashboard">
            <span class="nav-icon"><i class="fas fa-tachometer-alt"></i></span>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#inventory" data-page="inventory">
            <span class="nav-icon"><i class="fas fa-boxes"></i></span>
            <span>Inventory</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#suppliers" data-page="suppliers">
            <span class="nav-icon"><i class="fas fa-truck-loading"></i></span>
            <span>Suppliers</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#customers" data-page="customers">
            <span class="nav-icon"><i class="fas fa-user-friends"></i></span>
            <span>Customers</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#purchases" data-page="purchases">
            <span class="nav-icon"><i class="fas fa-file-invoice-dollar"></i></span>
            <span>Purchases</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#sales" data-page="sales">
            <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
            <span>Sales</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#receipts" data-page="receipts">
            <span class="nav-icon"><i class="fas fa-receipt"></i></span>
            <span>Receipts</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#payments" data-page="payments">
            <span class="nav-icon"><i class="fas fa-credit-card"></i></span>
            <span>Payments</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#reports" data-page="reports">
            <span class="nav-icon"><i class="fas fa-chart-pie"></i></span>
            <span>Reports</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#users" data-page="users">
            <span class="nav-icon"><i class="fas fa-user-cog"></i></span>
            <span>Users</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#settings" data-page="settings">
            <span class="nav-icon"><i class="fas fa-cogs"></i></span>
            <span>Settings</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="main-wrapper">
      <!-- Top Bar -->
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar (Collapse/Expand)">
            <i class="fas fa-bars"></i>
          </button>
          <div class="page-title">
            <h1>Billing & Inventory Management</h1>
          </div>
        </div>

        <div class="header-right">
          <!-- Role Switcher -->
          <div class="role-switcher-box">
            <i class="fas fa-user-shield" style="color: #1abc9c;"></i>
            <label>Role:</label>
            <select id="topRoleSelect">
              <option value="Administrator">Administrator (Full Access)</option>
              <option value="Billing Manager">Billing Manager</option>
              <option value="Inventory Clerk">Inventory Clerk</option>
              <option value="Accountant">Accountant (Read-Only)</option>
            </select>
          </div>

          <div class="badge-status">
            <span class="status-dot"></span> <span id="roleBadgeDisplay">Administrator Access</span>
          </div>
        </div>
      </header>

      <!-- Dynamic View Body -->
      <div class="content-body" id="view-container">
        <!-- Rendered dynamically by js/app.js -->
      </div>
    </main>
  </div>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db-service.js"></script>
  <script src="js/google-script-polyfill.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
