<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIC Billing & Inventory Software</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase JS SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <i class="fas fa-cubes"></i>
        </div>
        <div class="brand-text">
          <h2>AIC Billing</h2>
          <span>Firebase Edition</span>
        </div>
      </div>

      <ul class="nav-list">
        <li class="nav-item active">
          <a href="#dashboard" data-page="dashboard">
            <span class="nav-icon"><i class="fas fa-chart-pie"></i></span>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="#inventory" data-page="inventory">
            <span class="nav-icon"><i class="fas fa-boxes-stacked"></i></span>
            Inventory
          </a>
        </li>
        <li class="nav-item">
          <a href="#customers" data-page="customers">
            <span class="nav-icon"><i class="fas fa-users"></i></span>
            Customers
          </a>
        </li>
        <li class="nav-item">
          <a href="#suppliers" data-page="suppliers">
            <span class="nav-icon"><i class="fas fa-truck-field"></i></span>
            Suppliers
          </a>
        </li>
        <li class="nav-item">
          <a href="#sales" data-page="sales">
            <span class="nav-icon"><i class="fas fa-file-invoice-dollar"></i></span>
            Sales Orders
          </a>
        </li>
        <li class="nav-item">
          <a href="#purchases" data-page="purchases">
            <span class="nav-icon"><i class="fas fa-cart-shopping"></i></span>
            Purchase Orders
          </a>
        </li>
        <li class="nav-item">
          <a href="#receipts" data-page="receipts">
            <span class="nav-icon"><i class="fas fa-receipt"></i></span>
            Receipts
          </a>
        </li>
        <li class="nav-item">
          <a href="#payments" data-page="payments">
            <span class="nav-icon"><i class="fas fa-money-bill-transfer"></i></span>
            Payments
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="main-wrapper">
      <!-- Top Header -->
      <header class="top-header">
        <div class="page-title">
          <h1>Enterprise Billing & Inventory Management</h1>
        </div>
        <div class="header-actions">
          <div class="badge-status">
            <span class="status-dot"></span> Firebase Live Connected
          </div>
        </div>
      </header>

      <!-- Dynamic View Body -->
      <div class="content-body" id="view-container">
        <!-- Rendered dynamically by js/app.js -->
      </div>
    </main>
  </div>

  <!-- App Scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
